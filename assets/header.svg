<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="100%" height="100%">
  <defs>
    <!-- Fonts Import -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;family=Space+Grotesk:wght@700;800&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap');
      
      /* Animation Definitions */
      @keyframes float-slow {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-8px) rotate(1.5deg); }
      }
      @keyframes float-medium {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-12px) rotate(-2deg); }
      }
      @keyframes float-fast {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-6px) rotate(1deg); }
      }
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.15; transform: scale(1); }
        50% { opacity: 0.28; transform: scale(1.1); }
      }
      @keyframes pulse-dot {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.4); opacity: 0.4; }
      }
      @keyframes spin-react {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      /* Class Selectors */
      .bg-glow-cyan {
        animation: pulse-glow 7s ease-in-out infinite alternate;
        transform-origin: 150px 80px;
      }
      .bg-glow-purple {
        animation: pulse-glow 9s ease-in-out infinite alternate-reverse;
        transform-origin: 650px 180px;
      }
      .bg-glow-pink {
        animation: pulse-glow 8s ease-in-out infinite alternate;
        transform-origin: 450px 140px;
      }
      
      .main-card {
        animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      .title-name {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 800;
        font-size: 38px;
        fill: #ffffff;
        letter-spacing: 0.5px;
      }
      .name-span {
        font-family: 'Space Grotesk', -apple-system, sans-serif;
        font-weight: 800;
      }
      
      .subtitle {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 500;
        font-size: 16px;
        fill: #94a3b8;
      }
      
      .body-desc {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 400;
        font-size: 13px;
        fill: #64748b;
      }
      
      .badge-bg {
        fill: rgba(255, 255, 255, 0.04);
        stroke: rgba(255, 255, 255, 0.08);
        stroke-width: 1px;
      }
      
      .badge-txt {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 10px;
        fill: #a7f3d0;
        letter-spacing: 1px;
      }
      
      .code-line {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        fill: #e2e8f0;
      }
      
      .code-key { fill: #f43f5e; }
      .code-var { fill: #818cf8; }
      .code-str { fill: #34d399; }
      .code-punct { fill: #94a3b8; }
      
      /* Floating Logos Styles */
      .logo-group-1 { animation: float-slow 6s ease-in-out infinite; transform-origin: 620px 80px; }
      .logo-group-2 { animation: float-medium 7s ease-in-out infinite; transform-origin: 540px 145px; }
      .logo-group-3 { animation: float-fast 5s ease-in-out infinite; transform-origin: 680px 160px; }
      
      .react-orbit { animation: spin-react 20s linear infinite; transform-origin: 0px 0px; }
      
      .pulse-indicator {
        animation: pulse-dot 2s ease-in-out infinite;
        transform-origin: 22px 14px;
      }
    </style>

    <!-- Filters & Gradients -->
    <linearGradient id="bg-space" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040209" />
      <stop offset="60%" stop-color="#070617" />
      <stop offset="100%" stop-color="#020108" />
    </linearGradient>

    <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#FF2A85" />
    </linearGradient>

    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.16)" />
      <stop offset="40%" stop-color="rgba(255, 255, 255, 0.02)" />
      <stop offset="70%" stop-color="rgba(139, 92, 246, 0.05)" />
      <stop offset="100%" stop-color="rgba(0, 242, 254, 0.12)" />
    </linearGradient>

    <filter id="glow-heavy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="glow-subtle" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Clip Path for Typing Effect -->
    <clipPath id="typing-mask">
      <rect x="0" y="0" width="0" height="25">
        <animate attributeName="width" values="0; 390; 390; 0" keyTimes="0; 0.6; 0.9; 1" dur="7s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-space)" />
  
  <!-- Glowing Background Orbs -->
  <circle class="bg-glow-cyan" cx="150" cy="80" r="100" fill="#00F2FE" opacity="0.15" filter="url(#glow-heavy)" />
  <circle class="bg-glow-purple" cx="680" cy="180" r="120" fill="#8B5CF6" opacity="0.15" filter="url(#glow-heavy)" />
  <circle class="bg-glow-pink" cx="450" cy="140" r="80" fill="#FF2A85" opacity="0.08" filter="url(#glow-heavy)" />

  <!-- Tech Grid Overlay -->
  <g opacity="0.035" stroke="#ffffff" stroke-width="0.8">
    <path d="M 0,25 L 800,25 M 0,50 L 800,50 M 0,75 L 800,75 M 0,100 L 800,100 M 0,125 L 800,125 M 0,150 L 800,150 M 0,175 L 800,175 M 0,200 L 800,200 M 0,225 L 800,225 M 0,250 L 800,250" />
    <path d="M 50,0 L 50,280 M 100,0 L 100,280 M 150,0 L 150,280 M 200,0 L 200,280 M 250,0 L 250,280 M 300,0 L 300,280 M 350,0 L 350,280 M 400,0 L 400,280 M 450,0 L 450,280 M 500,0 L 500,280 M 550,0 L 550,280 M 600,0 L 600,280 M 650,0 L 650,280 M 700,0 L 700,280 M 750,0 L 750,280" />
  </g>

  <!-- Main Glassmorphic Container -->
  <g class="main-card" transform="translate(40, 35)">
    <!-- Card Base -->
    <rect width="720" height="210" rx="16" fill="rgba(255, 255, 255, 0.02)" stroke="url(#border-grad)" stroke-width="1.2" />
    
    <!-- Left Section: Profile Info -->
    <g transform="translate(40, 30)">
      <!-- Pulsing Collaboration Badge -->
      <g transform="translate(0, 0)">
        <rect width="185" height="26" rx="13" class="badge-bg" />
        <circle class="pulse-indicator" cx="22" cy="13" r="4.5" fill="#10B981" />
        <circle cx="22" cy="13" r="3" fill="#10B981" />
        <text x="38" y="17" class="badge-txt">OPEN TO COLLABORATION</text>
      </g>

      <!-- Main Name -->
      <text x="0" y="65" class="title-name">
        I'm <tspan class="name-span" fill="url(#name-grad)">Lakshmipathy</tspan>
      </text>

      <!-- Subtitle -->
      <text x="0" y="96" class="subtitle">
        Software Developer in the making
      </text>

      <!-- Brief Description -->
      <text x="0" y="118" class="body-desc">
        BCA student crafting modern, scalable, and human-centric web applications.
      </text>

      <!-- Glass Console/Terminal Line (Typewriter) -->
      <g transform="translate(0, 140)">
        <!-- Console Window Base -->
        <rect width="420" height="34" rx="6" fill="rgba(0, 0, 0, 0.3)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1" />
        
        <!-- Terminal Dots -->
        <circle cx="15" cy="17" r="3" fill="#ef4444" opacity="0.8" />
        <circle cx="25" cy="17" r="3" fill="#f59e0b" opacity="0.8" />
        <circle cx="35" cy="17" r="3" fill="#10b981" opacity="0.8" />

        <!-- Console Content Group -->
        <g transform="translate(55, 6)">
          <g clip-path="url(#typing-mask)">
            <text x="0" y="15" class="code-line">
              <tspan class="code-key">const</tspan> <tspan class="code-var">developer</tspan> <tspan class="code-punct">=</tspan> <tspan class="code-punct">{</tspan> <tspan class="code-var">craft</tspan><tspan class="code-punct">:</tspan> <tspan class="code-str">'MERN'</tspan><tspan class="code-punct">,</tspan> <tspan class="code-var">status</tspan><tspan class="code-punct">:</tspan> <tspan class="code-str">'building'</tspan> <tspan class="code-punct">};</tspan>
            </text>
          </g>
          
          <!-- Blinking Terminal Cursor -->
          <rect x="0" y="3" width="6" height="14" fill="#00d2ff" opacity="0.8">
            <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite" />
            <animate attributeName="x" values="0; 340; 340; 0" keyTimes="0; 0.6; 0.9; 1" dur="7s" repeatCount="indefinite" />
          </rect>
        </g>
      </g>
    </g>

    <!-- Right Section: Floating Brand Icons (React, Node, JavaScript) -->
    <!-- React Logo -->
    <g class="logo-group-1" transform="translate(620, 75)">
      <circle cx="0" cy="0" r="32" fill="#0b0f19" fill-opacity="0.6" stroke="rgba(0, 242, 254, 0.25)" stroke-width="1" filter="url(#glow-subtle)"/>
      <g class="react-orbit">
        <ellipse rx="18" ry="6.5" fill="none" stroke="#00d2ff" stroke-width="1.2" transform="rotate(0)"/>
        <ellipse rx="18" ry="6.5" fill="none" stroke="#00d2ff" stroke-width="1.2" transform="rotate(60)"/>
        <ellipse rx="18" ry="6.5" fill="none" stroke="#00d2ff" stroke-width="1.2" transform="rotate(120)"/>
        <circle cx="0" cy="0" r="3.5" fill="#00d2ff"/>
      </g>
    </g>

    <!-- Node.js Logo -->
    <g class="logo-group-2" transform="translate(540, 145)">
      <circle cx="0" cy="0" r="25" fill="#0b0f19" fill-opacity="0.6" stroke="rgba(34, 197, 94, 0.2)" stroke-width="1" filter="url(#glow-subtle)"/>
      <g transform="scale(0.85) translate(-14, -16)">
        <path d="M14.2 3.2L3.6 9.3c-.4.2-.6.7-.6 1.1v12.2c0 .4.2.9.6 1.1l10.6 6.1c.4.2.9.2 1.3 0l10.6-6.1c.4-.2.6-.7.6-1.1V10.4c0-.4-.2-.9-.6-1.1L15.5 3.2c-.4-.2-.9-.2-1.3 0z" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M14.8 3.2v25.6M14.8 16L3.6 9.3M14.8 16l11.2-6.7" stroke="#22c55e" stroke-width="1.2" opacity="0.4"/>
      </g>
    </g>

    <!-- JavaScript Logo -->
    <g class="logo-group-3" transform="translate(680, 160)">
      <circle cx="0" cy="0" r="22" fill="#0b0f19" fill-opacity="0.6" stroke="rgba(245, 158, 11, 0.2)" stroke-width="1" filter="url(#glow-subtle)"/>
      <g transform="scale(0.8) translate(-12, -12)">
        <rect x="0" y="0" width="24" height="24" rx="3.5" fill="#f59e0b" />
        <text x="19" y="19" font-family="'Outfit', sans-serif" font-weight="800" font-size="11.5" fill="#000" text-anchor="end">JS</text>
      </g>
    </g>
  </g>
</svg>
