<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <defs>
    <!-- Fonts Import -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap');
      
      /* Styling and Transitions */
      .card {
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), fill 0.4s ease, stroke 0.4s ease;
        fill: rgba(255, 255, 255, 0.02);
        stroke: url(#border-normal);
        stroke-width: 1.2;
      }
      
      .card-group {
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        cursor: pointer;
      }
      
      /* Interactive hover effects (where supported) */
      .card-group:hover {
        transform: translateY(-6px);
      }
      .card-group:hover .card {
        fill: rgba(255, 255, 255, 0.05);
        stroke: url(#border-hover);
        filter: drop-shadow(0 8px 16px rgba(139, 92, 246, 0.15));
      }
      
      .header-title {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 800;
        font-size: 18px;
        fill: #ffffff;
        letter-spacing: 0.5px;
      }
      
      .header-subtitle {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-size: 12px;
        fill: #64748b;
        font-weight: 400;
      }
      
      .card-title {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 700;
        font-size: 15px;
        fill: #ffffff;
      }
      
      .tech-name {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 500;
        font-size: 13px;
        fill: #e2e8f0;
      }
      
      .tech-details {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 500;
        font-size: 10px;
        fill: #64748b;
      }
      
      /* Glowing Effects */
      .glow-cyan { filter: drop-shadow(0 0 4px #00d2ff); }
      .glow-green { filter: drop-shadow(0 0 4px #22c55e); }
      .glow-yellow { filter: drop-shadow(0 0 4px #f59e0b); }
      .glow-purple { filter: drop-shadow(0 0 4px #8b5cf6); }
    </style>

    <!-- Background Space Gradient -->
    <linearGradient id="bg-space" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040209" />
      <stop offset="60%" stop-color="#070617" />
      <stop offset="100%" stop-color="#020108" />
    </linearGradient>

    <!-- Borders Gradients -->
    <linearGradient id="border-normal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.12)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.02)" />
    </linearGradient>
    
    <linearGradient id="border-hover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#FF2A85" />
    </linearGradient>

    <filter id="glow-heavy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Rect -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-space)" />
  
  <!-- Glowing Background Orbs -->
  <circle cx="400" cy="180" r="100" fill="#8B5CF6" opacity="0.08" filter="url(#glow-heavy)" />
  <circle cx="700" cy="60" r="80" fill="#00F2FE" opacity="0.06" filter="url(#glow-heavy)" />

  <!-- Layout Wrapper -->
  <g transform="translate(24, 25)">
    <!-- Header -->
    <g transform="translate(0, 0)">
      <text x="0" y="5" class="header-title">🛠️ MY TECH TOOLBOX</text>
      <text x="0" y="22" class="header-subtitle">Frameworks, languages, databases, and deployment ecosystems.</text>
    </g>

    <!-- Cards Grid -->
    <!-- Card 1: Frontend -->
    <g class="card-group" transform="translate(0, 42)">
      <rect class="card" width="172" height="142" rx="14" />
      <text x="18" y="28" class="card-title">Frontend Dev</text>
      <line x1="18" y1="38" x2="154" y2="38" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
      
      <!-- Tech Item 1: React -->
      <g transform="translate(18, 52)">
        <ellipse rx="8" ry="3" fill="none" stroke="#00d2ff" stroke-width="1" transform="translate(8, 8) rotate(0)" class="glow-cyan"/>
        <ellipse rx="8" ry="3" fill="none" stroke="#00d2ff" stroke-width="1" transform="translate(8, 8) rotate(60)" class="glow-cyan"/>
        <ellipse rx="8" ry="3" fill="none" stroke="#00d2ff" stroke-width="1" transform="translate(8, 8) rotate(120)" class="glow-cyan"/>
        <circle cx="8" cy="8" r="1.8" fill="#00d2ff"/>
        <text x="26" y="12" class="tech-name">React.js</text>
      </g>
      
      <!-- Tech Item 2: JavaScript -->
      <g transform="translate(18, 82)">
        <rect x="0" y="0" width="16" height="16" rx="2.5" fill="#f59e0b" class="glow-yellow"/>
        <text x="13" y="13" font-family="'Outfit', sans-serif" font-weight="800" font-size="8" fill="#000" text-anchor="end">JS</text>
        <text x="26" y="12" class="tech-name">JavaScript</text>
      </g>
      
      <!-- Tech subdetails -->
      <text x="18" y="122" class="tech-details">HTML5 • CSS3 • Tailwind</text>
    </g>

    <!-- Card 2: Backend -->
    <g class="card-group" transform="translate(192, 42)">
      <rect class="card" width="172" height="142" rx="14" />
      <text x="18" y="28" class="card-title">Backend &amp; DB</text>
      <line x1="18" y1="38" x2="154" y2="38" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
      
      <!-- Tech Item 1: Node.js -->
      <g transform="translate(18, 52)">
        <circle cx="8" cy="8" r="8" fill="rgba(34, 197, 94, 0.1)" stroke="#22c55e" stroke-width="1" class="glow-green" />
        <path d="M8,4.5 L11,6.25 L11,9.75 L8,11.5 L5,9.75 L5,6.25 Z" fill="none" stroke="#22c55e" stroke-width="0.8"/>
        <text x="26" y="12" class="tech-name">Node.js</text>
      </g>
      
      <!-- Tech Item 2: MongoDB -->
      <g transform="translate(18, 82)">
        <circle cx="8" cy="8" r="8" fill="rgba(16, 185, 129, 0.1)" stroke="#10b981" stroke-width="1" class="glow-green"/>
        <path d="M8,4.5 C9.8,6.2 9.8,9.2 8,11.5 C6.2,9.2 6.2,6.2 8,4.5 Z" fill="#10b981" opacity="0.8"/>
        <text x="26" y="12" class="tech-name">MongoDB</text>
      </g>
      
      <text x="18" y="122" class="tech-details">Express.js • MERN Stack</text>
    </g>

    <!-- Card 3: Languages -->
    <g class="card-group" transform="translate(384, 42)">
      <rect class="card" width="172" height="142" rx="14" />
      <text x="18" y="28" class="card-title">Languages</text>
      <line x1="18" y1="38" x2="154" y2="38" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
      
      <!-- Tech Item 1: Python -->
      <g transform="translate(18, 52)">
        <circle cx="8" cy="8" r="8" fill="rgba(59, 130, 246, 0.1)" stroke="#3b82f6" stroke-width="1" class="glow-cyan"/>
        <path d="M8,5 C7,5 6.8,5.6 6.8,6.1 L6.8,6.8 L7.8,6.8 L7.8,7.2 C7.2,7.2 6.7,7.4 6.7,8 C6.7,8.6 7.2,9.1 8.1,9.1 L8.8,9.1 L8.8,8.5 L7.8,8.5 C7.4,8.5 7.4,8 7.8,8 L8.8,8 C9.2,8 9.7,7.5 9.7,7 L9.7,6.1 C9.7,5.6 9.2,5 8,5 Z" fill="#ffd43b" opacity="0.95"/>
        <text x="26" y="12" class="tech-name">Python</text>
      </g>
      
      <!-- Tech Item 2: JavaScript/ES6 -->
      <g transform="translate(18, 82)">
        <circle cx="8" cy="8" r="8" fill="rgba(245, 158, 11, 0.1)" stroke="#f59e0b" stroke-width="1" class="glow-yellow"/>
        <text x="8" y="11" font-family="'Outfit', sans-serif" font-weight="800" font-size="8.5" fill="#f59e0b" text-anchor="middle">JS</text>
        <text x="26" y="12" class="tech-name">JavaScript</text>
      </g>
      
      <text x="18" y="122" class="tech-details">C / C++ Principles</text>
    </g>

    <!-- Card 4: Ecosystem -->
    <g class="card-group" transform="translate(576, 42)">
      <rect class="card" width="172" height="142" rx="14" />
      <text x="18" y="28" class="card-title">Ecosystem</text>
      <line x1="18" y1="38" x2="154" y2="38" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
      
      <!-- Tech Item 1: Git -->
      <g transform="translate(18, 52)">
        <circle cx="8" cy="8" r="8" fill="rgba(240, 80, 50, 0.1)" stroke="#f05032" stroke-width="1" class="glow-yellow" />
        <circle cx="8" cy="6.5" r="1" fill="#f05032"/>
        <circle cx="6.5" cy="9.5" r="1" fill="#f05032"/>
        <circle cx="9.5" cy="9.5" r="1" fill="#f05032"/>
        <line x1="8" y1="6.5" x2="6.5" y2="9.5" stroke="#f05032" stroke-width="0.8"/>
        <line x1="8" y1="6.5" x2="9.5" y2="9.5" stroke="#f05032" stroke-width="0.8"/>
        <text x="26" y="12" class="tech-name">Git &amp; GitHub</text>
      </g>
      
      <!-- Tech Item 2: Hosting -->
      <g transform="translate(18, 82)">
        <circle cx="8" cy="8" r="8" fill="rgba(168, 85, 247, 0.1)" stroke="#a855f7" stroke-width="1" class="glow-purple" />
        <polygon points="8,5.5 5,10.5 11,10.5" fill="#ffffff"/>
        <text x="26" y="12" class="tech-name">Vercel &amp; Netlify</text>
      </g>
      
      <text x="18" y="122" class="tech-details">VS Code • Notion</text>
    </g>
  </g>
</svg>
